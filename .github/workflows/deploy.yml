name: Deploy to Vercel

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

# This deploy workflow now only triggers after the "CI" workflow completes successfully on main.
# This gives you proper "CI then CD".
#
# Alternative (often simpler): Just connect the repo in the Vercel dashboard.
# Vercel will auto-deploy on push and run its own build (it will still benefit from the GitHub CI status checks).

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --yes'   # --yes skips confirmation
          # Optional: scope to a team
          # vercel-scope: ${{ secrets.VERCEL_TEAM_ID }}
